apiVersion: v1
kind: Service
metadata:
  name: <%= service.name %>-dev-ssh
  namespace: <%= project.namespace %>
  labels:
    caninemanaged: 'true'
    app: <%= service.name %>
    component: dev-environment
spec:
  type: LoadBalancer
  selector:
    app: <%= service.name %>
  ports:
  - name: ssh
    port: <%= dev_env.ssh_port %>
    targetPort: <%= dev_env.ssh_port %>
    protocol: TCP
