# Default values for canine.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/caninehq/canine
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Canine-specific configuration
canine:
  port: 3000
  bootMode: "cluster"
  secretKeyBase: ""
  # Onboarding method: "normal" or "portainer"
  onboardingMethod: "normal"
  # Allowed hostnames for Rails host authorization
  # Use "*" to allow all hosts (useful for Kubernetes with dynamic IPs)
  # Use comma-separated list for specific hosts: "example.com,api.example.com"
  # Leave empty to only allow localhost (default)
  allowedHostname: "*"
  # Application hostname used for generating URLs in background jobs
  # Defaults to the first ingress host if ingress is enabled
  appHost: ""
  # Email for Let's Encrypt certificate registration
  acmeEmail: "admin@example.com"

# Worker configuration for GoodJob background jobs
worker:
  enabled: true
  replicaCount: 1
  maxThreads: 5
  queues: "*"
  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 250m
    #   memory: 256Mi

# Service configuration
service:
  type: ClusterIP
  port: 3000

# Ingress configuration
ingress:
  enabled: false
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts:
    - host: canine.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: canine-tls
      hosts:
        - canine.example.com

# Resource limits and requests
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 1024Mi
  # requests:
  #   cpu: 500m
  #   memory: 512Mi

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Pod configuration
podAnnotations: {}
podLabels: {}
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

nodeSelector: {}
tolerations: []
affinity: {}

# PostgreSQL configuration (Bitnami PostgreSQL chart)
postgresql:
  enabled: true
  auth:
    username: postgres
    password: password
    database: canine_production
    # You can also create additional databases
    postgresPassword: password
  primary:
    service:
      ports:
        postgresql: 5432
    persistence:
      enabled: true
      size: 8Gi
  # Additional PostgreSQL configuration
  # See: https://github.com/bitnami/charts/tree/main/bitnami/postgresql
  initdbScripts:
    init.sql: |
      CREATE DATABASE IF NOT EXISTS canine_development;
      GRANT ALL PRIVILEGES ON DATABASE canine_development TO postgres;

# Cert Manager configuration (jetstack/cert-manager chart)
# Set enabled: false if cert-manager is already installed on your cluster
cert-manager:
  enabled: true
  crds:
    enabled: true
  extraArgs:
    - --acme-http01-solver-nameservers=8.8.8.8:53

# Traefik Ingress Controller configuration (traefik/traefik chart)
# Set enabled: false if an ingress controller is already installed on your cluster
traefik:
  enabled: true
  ingressClass:
    name: traefik
  providers:
    kubernetesIngress:
      publishedService:
        enabled: true
  ports:
    web:
      port: 8000
      exposedPort: 80
      allowACMEByPass: true
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
    websecure:
      port: 8443
      exposedPort: 443
